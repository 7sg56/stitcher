version: "3.9"

services:
  # ========================================
  # API (Fastify)
  # ========================================
  api:
    build:
      context: ..
      dockerfile: docker/api.Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      CORS_ORIGIN: http://localhost:3000
    env_file:
      - ../.env
    ports:
      - "3001:3001"
    networks:
      - stitcher_network

  # ========================================
  # Web (Next.js)
  # ========================================
  web:
    build:
      context: ..
      dockerfile: docker/web.Dockerfile
      args:
        NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY}
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    restart: unless-stopped
    depends_on:
      - api
    environment:
      NODE_ENV: production
      PORT: 3000
      NEXT_PUBLIC_CLERK_SIGN_IN_URL: /sign-in
      NEXT_PUBLIC_CLERK_SIGN_UP_URL: /sign-up
    env_file:
      - ../.env
    ports:
      - "3000:3000"
    networks:
      - stitcher_network

networks:
  stitcher_network:
    driver: bridge
